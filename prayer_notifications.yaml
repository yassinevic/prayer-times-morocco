# ============================================================
# Morocco Prayer Times - Notification Automation
# ============================================================
# Copy this file or paste its content into your HA automations.
#
# Requirements:
#   - Morocco Prayer Times integration installed and configured
#   - A notify service configured (e.g. notify.mobile_app_your_phone)
#     -> Replace "notify.mobile_app_your_phone" below with your service name
#
# How it works:
#   Each automation triggers exactly at the time stored in the
#   corresponding prayer sensor (e.g. sensor.prayer_fajr = "05:15").
#   The notification includes the prayer name, time, and configured city.
# ============================================================

- id: prayer_times_morocco_fajr
  alias: "🕌 Prayer Notification - Fajr"
  description: "Send a notification when it's time for Fajr prayer"
  trigger:
    - platform: time
      at: sensor.prayer_fajr
  action:
    - service: notify.mobile_app_your_phone
      data:
        title: "🌙 {{ states('sensor.prayer_next') }}"
        message: >
          It is time for {{ states('sensor.prayer_next') }} prayer.
          Time: {{ states('sensor.prayer_fajr') }}
          City: {{ states('sensor.prayer_city') }}
        data:
          icon: /local/prayer_times_morocco/icon.png
          ttl: 0
          priority: high
          channel: prayer_times

