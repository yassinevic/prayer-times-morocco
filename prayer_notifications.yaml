- id: prayer_times_morocco_fajr
  alias: "Prayer - Fajr"
  description: "Send a notification when it's time for Fajr prayer"
  mode: single
  trigger:
    - platform: time
      at: sensor.prayer_fajr
  action:
    - service: notify.mobile_app_your_phone
      data:
        title: "🌙 Prayer Time - {{ states('sensor.prayer_fajr') }}"
        message: >-
          {{ states('sensor.prayer_next') }} prayer time in {{ states('sensor.prayer_city') }}.

