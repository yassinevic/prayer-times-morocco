<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="domeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0722a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4a96d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="minaretGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4b76a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8943f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <circle cx="30" cy="30" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="55" cy="18" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="80" cy="35" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="170" cy="22" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="200" cy="38" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="225" cy="20" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="240" cy="45" r="1.5" fill="#fff" opacity="0.7"/>

  <!-- Crescent moon -->
  <g filter="url(#glow)" transform="translate(210, 25)">
    <circle cx="0" cy="0" r="14" fill="#c9a84c"/>
    <circle cx="6" cy="-4" r="11" fill="#16213e"/>
  </g>

  <!-- LEFT MINARET -->
  <!-- Minaret base -->
  <rect x="42" y="130" width="22" height="80" rx="2" fill="url(#minaretGrad)"/>
  <!-- Minaret balcony -->
  <rect x="38" y="126" width="30" height="6" rx="2" fill="#c9a84c"/>
  <!-- Minaret upper section -->
  <rect x="46" y="100" width="14" height="30" rx="2" fill="url(#minaretGrad)"/>
  <!-- Minaret cap dome -->
  <ellipse cx="53" cy="100" rx="9" ry="5" fill="#c9a84c"/>
  <path d="M44,100 Q53,82 62,100" fill="#c9a84c"/>
  <!-- Minaret spire -->
  <line x1="53" y1="82" x2="53" y2="70" stroke="#c9a84c" stroke-width="2"/>
  <!-- Minaret crescent -->
  <g transform="translate(53, 67)">
    <circle cx="0" cy="0" r="5" fill="#c9a84c"/>
    <circle cx="2" cy="-1.5" r="4" fill="#16213e"/>
    <circle cx="0" cy="-8" r="1.5" fill="#c9a84c"/>
  </g>
  <!-- Window on minaret -->
  <path d="M48,148 Q53,142 58,148 L58,162 L48,162 Z" fill="#0f3460" opacity="0.8"/>

  <!-- RIGHT MINARET -->
  <rect x="192" y="130" width="22" height="80" rx="2" fill="url(#minaretGrad)"/>
  <rect x="188" y="126" width="30" height="6" rx="2" fill="#c9a84c"/>
  <rect x="196" y="100" width="14" height="30" rx="2" fill="url(#minaretGrad)"/>
  <ellipse cx="203" cy="100" rx="9" ry="5" fill="#c9a84c"/>
  <path d="M194,100 Q203,82 212,100" fill="#c9a84c"/>
  <line x1="203" y1="82" x2="203" y2="70" stroke="#c9a84c" stroke-width="2"/>
  <g transform="translate(203, 67)">
    <circle cx="0" cy="0" r="5" fill="#c9a84c"/>
    <circle cx="2" cy="-1.5" r="4" fill="#16213e"/>
    <circle cx="0" cy="-8" r="1.5" fill="#c9a84c"/>
  </g>
  <path d="M198,148 Q203,142 208,148 L208,162 L198,162 Z" fill="#0f3460" opacity="0.8"/>

  <!-- MAIN BUILDING -->
  <!-- Base wall -->
  <rect x="68" y="148" width="120" height="62" rx="3" fill="url(#wallGrad)"/>

  <!-- Side small domes -->
  <ellipse cx="88" cy="148" rx="20" ry="10" fill="#d4b76a"/>
  <path d="M68,148 Q88,118 108,148" fill="#d4b76a"/>
  <ellipse cx="168" cy="148" rx="20" ry="10" fill="#d4b76a"/>
  <path d="M148,148 Q168,118 188,148" fill="#d4b76a"/>

  <!-- Main dome base -->
  <ellipse cx="128" cy="148" rx="38" ry="14" fill="url(#domeGrad)"/>
  <!-- Main dome -->
  <path d="M90,148 Q90,85 128,78 Q166,85 166,148" fill="url(#domeGrad)"/>
  <!-- Dome highlight -->
  <path d="M100,140 Q105,100 120,90" stroke="#e8c96a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Dome spire -->
  <line x1="128" y1="78" x2="128" y2="62" stroke="#c9a84c" stroke-width="2.5"/>
  <!-- Main crescent -->
  <g transform="translate(128, 58)" filter="url(#glow)">
    <circle cx="0" cy="0" r="7" fill="#c9a84c"/>
    <circle cx="3" cy="-2" r="5.5" fill="#16213e"/>
    <circle cx="0" cy="-11" r="2" fill="#c9a84c"/>
  </g>

  <!-- Main entrance arch -->
  <path d="M104,210 L104,170 Q128,150 152,170 L152,210 Z" fill="#0f3460"/>
  <path d="M108,210 L108,172 Q128,155 148,172 L148,210 Z" fill="#1a1a5e" opacity="0.6"/>
  <!-- Arch keystone detail -->
  <path d="M120,168 Q128,158 136,168" stroke="#c9a84c" stroke-width="1.5" fill="none"/>

  <!-- Side windows (arched) -->
  <path d="M74,178 Q82,170 90,178 L90,196 L74,196 Z" fill="#0f3460"/>
  <path d="M166,178 Q174,170 182,178 L182,196 L166,196 Z" fill="#0f3460"/>

  <!-- Decorative band on wall -->
  <rect x="68" y="196" width="120" height="3" fill="#c9a84c" opacity="0.6"/>

  <!-- Ground / base line -->
  <rect x="30" y="208" width="196" height="6" rx="3" fill="#c9a84c" opacity="0.4"/>
  <rect x="20" y="212" width="216" height="4" rx="2" fill="#c9a84c" opacity="0.2"/>
</svg>
